apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: layers
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # version + values come from each env's nxdeployment-<env>-env/environment.yaml
  generators:
    # one matrix per env: cross that env's environment.yaml with the layer list
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/Nvision-x/nxdeployment-development-env.git
              revision: development
              files:
                - path: environment.yaml
          - list:
              elements: &layers
                - { chart: processing-systems }
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/Nvision-x/nxdeployment-integration-env.git
              revision: development
              files:
                - path: environment.yaml
          - list:
              elements: *layers
  template:
    metadata:
      name: "{{ .chart }}-{{ .environment.cluster.name }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: nvisionx-development
      destination:
        name: "{{ .environment.cluster.name }}"
        namespace: "{{ .environment.namespace }}"
      sources:
        - repoURL: "{{ .registry.url }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .registry.defaultVersion }}"
          helm:
            releaseName: "{{ .chart }}"
            valueFiles:
              - $envvalues/values.yaml
              - $envvalues/profiles/eks.yaml
        - repoURL: "https://github.com/Nvision-x/nxdeployment-{{ .environment.name }}-env.git"
          targetRevision: development
          ref: envvalues
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
