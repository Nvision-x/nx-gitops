apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: layers
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # version + values come from each env's nxdeployment-<env>-env/environment.yaml
  generators:
    - git:
        repoURL: https://github.com/Nvision-x/nxdeployment-development-env.git
        revision: development
        files:
          - path: environment.yaml
    - git:
        repoURL: https://github.com/Nvision-x/nxdeployment-integration-env.git
        revision: development
        files:
          - path: environment.yaml
  template:
    metadata:
      name: "processing-systems-{{ .environment.cluster.name }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: nvisionx-development
      destination:
        name: "{{ .environment.cluster.name }}"
        namespace: argocd-poc
      sources:
        - repoURL: "{{ .registry.url }}"
          chart: processing-systems
          targetRevision: "{{ .registry.defaultVersion }}"
          helm:
            releaseName: processing-systems
            valueFiles:
              - $envvalues/values.yaml
              - $envvalues/profiles/eks.yaml
        - repoURL: "https://github.com/Nvision-x/nxdeployment-{{ .environment.name }}-env.git"
          targetRevision: development
          ref: envvalues
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
